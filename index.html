<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta http-equiv="X-UA-Compatible" content="IE=edge">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <meta name="apple-mobile-web-app-capable" content="yes">
 <meta name="apple-mobile-web-app-status-bar-style" content="black">
 <title>Cookeville Weather</title>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
 <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
 <link rel="apple-touch-icon" href="images/AppIcon.png">
 <link rel="icon" type="image" href="images/AppIcon.png"> 
</head>
<body class="bg-dark text-white">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6">
                <div class="card shadow rounded-4" style="min-height: 60vh;">
                    <div class="card-body text-center py-5 d-flex flex-column justify-content-center">

                        <h1 class="h3 fs-1 mb-5">Cookeville</h1>

                        <div class="mb-1">
                            <i class="bi bi-cloud-fill" style="font-size: 4rem;" id="txtWeather" aria-hidden="true"></i>
                        </div>

                        <h2  class="h4 fs-3 mt-3" id="txtCondition">Condition</h2>

                        <hr class="thick-line">

                        <p class="display-5 mb-2">
                            <span id="txtTemperature">--</span>°F
                        </p>

                        <p class="lead mb-1">
                            Humidity: <span id="txtHumidity">--</span>%
                        </p>

                        <p class="lead mb-1 fs-5">
                            Feels Like: <span id="txtApparentTemperature">--</span>°F
                        </p>
                    </div>
                </div>
                <footer class="text-center mt-3 small text-light">
                    Weather data from
                    <a href="https://open-meteo.com/" class="text-info">Open-Meteo</a>
                </footer>
                <div class="text-center mt-4">
                    <img src="images/hippo.png" alt="A rather dapper hippo." class="img-fluid">
                </div>
            </div>
        </div>
    </div>
    <script>
        const strBaseURL = "https://api.open-meteo.com/v1/forecast?latitude=36.1682&longitude=-85.5016&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code&temperature_unit=fahrenheit&timezone=America%2FChicago";
        
        fetch(strBaseURL)             //Fetches data in json format from the api link then plugs it in to the corresponding id's we made in index.html
            .then(result => {
                if(result.ok) {
                    return result.json();
                } else {
                    throw new Error(result.status);
                }
            })
            .then(data =>{              
                document.querySelector("#txtTemperature").textContent = data.current.temperature_2m;        //Replaces placeholder text with current temperature
                document.querySelector("#txtHumidity").textContent = data.current.relative_humidity_2m;     //Replaces placeholder text with current humidity
                console.log(data);

                let intCode = data.current.weather_code;
                let strCondition = "";
                let strIcon = "";

                if(intCode === 0) {                                // if-else statements to match the weather code with the correct icons and condition
                    strCondition = "Sunny"
                    strIcon = "bi bi-cloud-fill"
                } else if(intCode >=1 && intCode <= 3) {
                    strCondition = "Cloudy"
                    strIcon = "bi bi-cloud-fill"
                } else if(intCode === 45 || intCode === 48) {
                    strCondition = "Foggy"
                    strIcon = "bi bi-cloud-fog-fill"
                } else if(intCode >= 51 && intCode <= 67) {
                    strCondition = "Rainy"
                    strIcon = "bi bi-cloud-rain-fill"
                } else if(intCode >= 71 && intCode <= 77) {
                    strCondition = "Snow"
                    strIcon = "bi bi-cloud-snow"
                } else if(intCode >= 80 && intCode <= 82) {
                    strCondition = "Rain Showers"
                    strIcon = "bi bi-cloud-rain-fill"
                } else if(intCode >= 85 && intCode <= 86) {
                    strCondition = "Snow Showers"
                    strIcon = "bi bi-cloud-snow-fill"
                } else if (intCode >=95) {
                    strCondition = "Thunderstorm"
                } else {
                    strCondition = "Rare"
                    strIcon = "bi bi-emoji-surprise-fill"
                }

                document.querySelector("#txtCondition").textContent = strCondition;     // After the if-else statements are complete, the txtCondition, txtWeather, and 
                document.querySelector("#txtWeather").className = strIcon + " fs - 1";  // txtApparentTemperature placeholders are filled with the correct data
                document.querySelector("#txtApparentTemperature").textContent = data.current.apparent_temperature;
            })
            </script>
        </body>
        </html>

        <!--I had ChatGPT generate the image used for my app icon.-->
