<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta http-equiv="X-UA-Compatible" content="IE=edge">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <meta name="apple-mobile-web-app-capable" content="yes">
 <meta name="apple-mobile-web-app-status-bar-style" content="black">
 <title>Cookeville Weather</title>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
 <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body class="bg-dark text-white">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6">
                <div class="card shadow">
                    <div class="card-body text-center">

                        <h1 class="h3 mb-3">Cookeville</h1>

                        <div class="mb-1">
                            <i class="bi bi-cloud-fill" style="font-size: 3rem;" id="txtWeather"></i>
                        </div>

                        <h2  class="h4 mt-3" id="txtCondition">Condition</h2>

                        <hr></hr>

                        <p class="display-5 mb-2">
                            <span id="txtTemperature">--</span>°F
                        </p>

                        <p class="lead mb-1">
                            Humidity: <span id="txtHumidity">--</span>%
                        </p>

                        <p class="lead mb-1 fs-5">
                            Feels Like: <span id="txtApparentTemperature">--</span>°F
                        </p>
                    </div>
                </div>
                <footer class="text-center mt-3 small">
                    Weather data from
                    <a href="https://open-meteo.com/">Open-Meteo</a>
                </footer>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
